# CircleCI entrypoint: setup workflow merges modular YAML, then continues the real pipeline.
# Edit fragments under parts/, linux/, macos/, publish/, workflows/ — not merged-config.yml.
#
# Merge + continuation run only when you trigger with pipeline parameter run_pipeline=true.
# Plain pushes/tags: no workflows run (no Docker job → no per-job minute billing for the skip path).
#
# See .circleci/README.md
#
version: 2.1
setup: true

parameters:
  # Manual trigger gate: keep false so push/tag pipelines do not build by default.
  run_pipeline:
    type: boolean
    default: false
  build_ref:
    type: string
    default: ""
  upload_github_release:
    type: boolean
    default: false
  run_linux_x64_gnu:
    type: boolean
    default: true
  run_linux_x64_gnu_baseline:
    type: boolean
    default: false
  # Free plan often has no hosted macOS; keep opt-in.
  run_macos_build:
    type: boolean
    default: false

orbs:
  continuation: circleci/continuation@0.3.1

jobs:
  generate-merged-config:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Merge modular CircleCI config
          command: bash .circleci/assemble-config.sh
      - continuation/continue:
          configuration_path: .circleci/merged-config.yml

workflows:
  version: 2.1
  merge-and-continue:
    when:
      equal: [true, << pipeline.parameters.run_pipeline >>]
    jobs:
      - generate-merged-config
